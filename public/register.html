<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta - Mapa de Impressoras</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body class="login-body">

    <main class="login-container">
        <div class="login-card">
            <h1>Criar conta</h1>
            <p>Cadastre seu usuário</p>

            <form id="registerForm">
                <input
                    type="text"
                    id="registerUser"
                    placeholder="Usuário"
                    required
                >

                <input
                    id="registerContractNumber"
                    type="text"
                    placeholder="Número do contrato">

                <input
                    type="password"
                    id="registerPassword"
                    placeholder="Senha"
                    required
                >

                <input
                    id="confirmRegisterPassword"
                    type="password"
                    placeholder="Confirmar senha"
                >

                <button type="submit">
                    Cadastrar
                </button>
            </form>

            <a href="login.html">Já tenho conta</a>

            <span id="registerMessage"></span>
        </div>
    </main>

    <footer class="app-footer">© Desenvolvido por <a href="https://www.linkedin.com/in/gabriel-salton-5686b1219" target="_blank" rel="noopener noreferrer">Gabriel Salton</a></footer>
    <script src="js/register.js"></script>
</body>
</html>
