<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa de Impressoras</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
 
    <!--Cabeçalho-->
<header>
    <h1>Mapa de Impressoras</h1>

    <button id="menuBtn" class="menu-btn btn-effect">

        <img
            id="logoSimpress"
            class="logo1"
            src="logo/logo1.png"
            alt="logoSimpress">

    </button>

    <input
        id="search"
        class="search"
        type="search"
        placeholder="Filtrar por S/N, modelo, setor..."
        aria-label="Buscar impressora">
</header>


<aside id="quickLinksSidebar" class="quick-links-sidebar">

    <div class="sidebar-user">
        <span id="loggedUserName"></span>
        <span id="loggedUserRole"></span>
        <span id="loggedUserPlant"></span>
    </div>

    <div class="quick-links-header">
        <h2>Atalhos</h2>

        <button id="closeQuickLinks" class="close-quick-links btn-effect">
            &times;
        </button>
    </div>

    <div class="quick-links-list"></div>

        <button id="addQuickLinkBtn" class="add-quick-link-btn btn-effect">
            + Adicionar atalho
        </button>

    <div id="quickLinkForm" class="quick-link-form hidden">

    <input
        type="text"
        id="quickLinkName"
        placeholder="Nome do atalho">

    <input
        type="url"
        id="quickLinkUrl"
        placeholder="https://site.com">

    <button id="saveQuickLinkBtn" class="btn-effect">
        Salvar Atalho
    </button>

</div>

        <button id="adminPanelBtn" class="admin-panel-btn btn-effect">
            Administração
        </button>

        <button id="logoutBtn" class="logout-btn btn-effect">
            Sair
        </button>

</aside>
 
    <!--Contêiner mapa, botões e contadores-->
    <div class="map-container">

        <div class="plant-selector-box">
            <select id="plantSelect"></select>
            <!-- <select id="plantSelect">
                <option value="ANC">Anchieta</option>
                <option value="SCAR">São Carlos</option>
                <option value="SJP" selected>São José dos Pinhais</option>
                <option value="TAUB">Taubaté</option>
                <option value="VIN">Vinhedo</option>
            </select> -->
        </div>

        <div class="map-column">

            <div class="map-wrap" id="mapWrap" aria-label="Planta do local com marcadores de impressoras">
                <div id="panzoom-area">
                    <img id="floor" src="" alt="Planta do local">
                    <div class="pins" id="pins"></div>
                </div>
            </div>

            <div class="map-pagination" id="mapPagination">
                <button id="prevMapPageBtn" type="button">◀</button>

                <div id="mapPageNumbers"></div>

                <button id="nextMapPageBtn" type="button">▶</button>
            </div>

        </div>
 
        <!-- Botões ao lado direito do mapa -->
        <div class="sidebar-buttons">
            <div class="contadorImpressoras" id="contadorImpressoras" aria-label="Informativo da quantidade de impressoras adicionadas à planta">
                <span id="printerCounter">0 Impressoras</span>
                 <span id="bkpCounter"> | 0 Backups ativos</span>
            </div>
            <button id="toggleHelper" type="button" title="Dê dois cliques no local para adicionar a impressora">
                Adicionar impressoras
            </button>

            <button id="deletePrinterSidebarBtn" type="button">
                Excluir Impressoras
            </button>

            <div class="sidebar-divider"></div>

            <button id="manageMapsBtn" type="button">
                Gerenciar Mapas
            </button>

            <div id="mapManagerActions" class="map-manager-actions hidden">
                <button id="addMapBtn" type="button">
                    Adicionar Planta
                </button>

                <button id="addPageBtn" type="button">
                    Adicionar Página
                </button>

                <button id="deletePageBtn" type="button">
                    Excluir Página
                </button>

                <button id="deleteMapBtn" type="button">
                    Excluir Planta
                </button>
            </div>

        </div>
    </div>
   
    <!-- Modal com informações da impressora -->
    <div class="modal" id="modal" role="dialog" aria-modal="true">
        <div class="card">
            <button class="close" id="closeModal" aria-label="fechar">&times;</button>
 
            <!--Adicionar fotos-->
            <div class="seçãoDeFotos">
                <div class="efeitoCarrossel">
                    <button class="mFoto Esquerda" id="fotoAnterior">&#10094;</button>
                    <img id="previewFoto" src="" alt="">
                    <button class="mFoto Direita" id="proxFoto">&#10095;</button>
                </div>

                <div id="contadorFotos"></div>
                
                <div class="actFotos">
                    <input type="file" id="adFoto" accept="image/*" multiple hidden>
                    <button id="addFotoBtn">Adicionar / Tirar foto</button>
                    <button id="removerFoto">Remover Foto</button>
                </div>
            </div>
 
            <!--Formulário-->
            <form id="infoPrinters">
                <label>Modelo:<input type="text" id="mModel"></label>
                <label>S/N:<input type="text" id="mSerial"></label>
                <label>
                    IP:
                    <div class="ip-container">
                        <input type="text" id="mIP">
                        <button type="button" id="mIPLink" style="display:none;">
                            Abrir
                        </button>
                    </div>
                </label>
                <label>Setor/Andar:<input type="text" id="mLocal"></label>
                <label>Coluna:<input type="text" id="mCol"></label>
                <label>Observações:<textarea id="mNotes"></textarea></label>
 
                <!-- Checkbox Backup-->
                 <label class="checkBkp">
                    <input type="checkbox" id="mBckp"> Equipamento Backup? </input>
                 </label>
 
                 <button type="submit" id="salvarImpressora">Salvar</button>
            </form>
           
            <button class="Delete" id="deletePrinterBtn"> Excluir Impressora</button>
        </div>  
    </div>

    <!-- Scripts -->
    <footer class="app-footer">© Desenvolvido por <a href="https://www.linkedin.com/in/gabriel-salton-5686b1219" target="_blank" rel="noopener noreferrer">Gabriel Salton</a></footer>
    <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
