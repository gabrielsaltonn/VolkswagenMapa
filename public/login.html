<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mapa de Impressoras</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <main class="login-container">
        <div class="login-card">
            <h1>Mapa de Impressoras</h1>
            <p>Acesse sua conta</p>

            <form id="loginForm">
                <input
                    type="text"
                    id="loginUser"
                    placeholder="Usuário"
                    required
                >

                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Senha"
                    required
                >

                <button type="submit">
                    Entrar
                </button>
            </form>

            <a href="register.html">Ainda não tem conta? Cadastre-se</a>

            <span id="loginMessage"></span>
        </div>
    </main>

    <footer class="app-footer">© Desenvolvido por <a href="https://www.linkedin.com/in/gabriel-salton-5686b1219" target="_blank" rel="noopener noreferrer">Gabriel Salton</a></footer>
    <script src="js/login.js"></script>
</body>
</html>
