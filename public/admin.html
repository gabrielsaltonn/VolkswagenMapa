<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - Mapa de Impressoras</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

        <header>

            <button id="backToMapBtn" class="menu-btn btn-effect">
                Voltar
            </button>

            <h1>Administração</h1>

            <div class="admin-header-right">

            <input
                id="userSearch"
                class="admin-search"
                type="search"
                placeholder="Buscar usuário..."
                aria-label="Buscar usuário">

        </div>

    </header>
    
    <div class="admin-counter">
        <span id="activeUsersCounter">Ativos: 0</span>
        <span id="pendingUsersCounter"> | Pendentes: 0</span>
        <span id="adminUsersCounter"> | Adm's: 0</span>
    </div>

    <main class="admin-container">

        <section id="contractsSection" class="admin-section">
            <h2>Contratos</h2>

            <div class="admin-section-actions">
                <button
                    type="button"
                    id="createContractBtn"
                    class="primary-admin-btn">
                    + Novo contrato
                </button>
            </div>

            <div 
                id="contractsList"
                class="admin-contracts-list">
            </div>
        </section>

        <section id="pendingSection" class="admin-section">
            <h2>Usuários Pendentes</h2>

            <div id="pendingUsersList" class="admin-users-list"></div>
        </section>

        <section class="admin-section">
            <h2>Todos os usuários</h2>

            <div id="allUsersList" class="admin-users-list"></div>
        </section>

    </main>

    <div
    class="modal"
    id="userModal"
    role="dialog"
    aria-modal="true">

    <div class="card">

        <button
            class="close"
            id="closeUserModal">
            &times;
        </button>

        <h2 id="userModalName">
            Usuário
        </h2>

        <label>
            Perfil do usuário

            <select id="userSystemRole">
                <option value="user">
                    Usuário
                </option>

                <option value="gestor">
                    Gestor
                </option>
            </select>
        </label>

        <div class="user-access-section">

            <div
                id="userAccessList"
                class="user-access-list">
            </div>

            <button
                id="addUserAccessBtn"
                type="button"
                class="btn-effect">
                + Adicionar contrato
            </button>

        </div>

        <label>
            Status
            
            <div 
                id="userStatus" 
                class="user-status-box">
            </div>
        </label>

        <button id="saveUserBtn">
            Salvar
        </button>

        <button id="approveUserBtn">
            Aprovar
        </button>

        <button id="rejectUserBtn">
            Rejeitar
        </button>

        <button
            class="Delete"
            id="deleteUserBtn">
            Excluir Usuário
        </button>

    </div>

</div>

<div
    id="adminMessageModal"
    class="modal"
    role="dialog"
    aria-modal="true">

    <div class="admin-message-card">

        <button
            id="closeAdminMessageModal"
            class="close"
            type="button">
            &times;
        </button>

        <h2 id="adminMessageTitle">
            Mensagem
        </h2>

        <p id="adminMessageText">
        </p>

        <div class="admin-modal-actions">

            <button
                id="cancelAdminMessageBtn"
                class="btn-effect"
                type="button">
                Cancelar
            </button>

            <button
                id="confirmAdminMessageBtn"
                class="btn-effect danger-btn"
                type="button">
                OK
            </button>

        </div>

    </div>

</div>

    <div
        id="contractModal"
        class="modal"
        role="dialog"
        aria-modal="true">

        <div class="card small-modal-card">

            <button
                type="button"
                id="closeContractModal"
                class="close">
                &times;
            </button>

            <h2>
                Novo contrato
            </h2>

            <label>
                Nome do contrato

                <input
                    id="contractNameInput"
                    type="text"
                    placeholder="Ex: Unimed">
            </label>

            <label>
                Número do contrato

                <input
                    id="contractNumberInput"
                    type="text"
                    placeholder="Ex: 5678">
            </label>

            <div
                id="contractModalMessage"
                class="admin-form-message">            
            </div>

            <button
                type="button"
                id="saveContractBtn"
                class="primary-admin-btn">
                Salvar contrato
            </button>

        </div>
    
    </div>

    <footer class="app-footer">
        © Desenvolvido por
        <a href="https://www.linkedin.com/in/gabriel-salton-5686b1219"
           target="_blank"
           rel="noopener noreferrer">
            Gabriel Salton
        </a>
    </footer>

    <script src="js/admin.js"></script>
</body>
</html>
