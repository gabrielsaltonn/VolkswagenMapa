<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - Mapa de Impressoras</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Administração</h1>

        <button id="backToMapBtn" class="menu-btn btn-effect">
            Voltar
        </button>
    </header>

    <main class="admin-container">

        <section class="admin-section">
            <h2>Usuários Pendentes</h2>

            <div id="pendingUsersList" class="admin-users-list"></div>
        </section>

        <section class="admin-section">
            <h2>Todos os usuários</h2>

            <div id="allUsersList" class="admin-users-list"></div>
        </section>

    </main>

    <div
    class="modal"
    id="userModal"
    role="dialog"
    aria-modal="true">

    <div class="card">

        <button
            class="close"
            id="closeUserModal">
            &times;
        </button>

        <h2 id="userModalName">
            Usuário
        </h2>

        <label>
            Role

            <select id="userRole">
                <option value="user">
                    user
                </option>

                <option value="admin">
                    admin
                </option>
            </select>
        </label>

        <label>
            Planta

            <select id="userPlant">
                <option value="ANC">ANC</option>
                <option value="SCAR">SCAR</option>
                <option value="SJP">SJP</option>
                <option value="TAUB">TAUB</option>
                <option value="VIN">VIN</option>
                <option value="ALL">ALL</option>
            </select>
        </label>

        <label>
            Status

            <select id="userStatus">
                <option value="pending">
                    pending
                </option>

                <option value="approved">
                    approved
                </option>

                <option value="rejected">
                    rejected
                </option>
            </select>
        </label>

        <button id="saveUserBtn">
            Salvar
        </button>

        <button
            class="Delete"
            id="deleteUserBtn">
            Excluir Usuário
        </button>

    </div>

</div>

    <footer class="app-footer">
        © Desenvolvido por
        <a href="https://www.linkedin.com/in/gabriel-salton-5686b1219"
           target="_blank"
           rel="noopener noreferrer">
            Gabriel Salton
        </a>
    </footer>

    <script src="js/admin.js"></script>
</body>
</html>
